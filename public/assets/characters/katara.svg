<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 256" width="128" height="256">
  <!-- Shadow -->
  <ellipse cx="64" cy="252" rx="26" ry="6" fill="rgba(0,0,0,0.22)"/>

  <!-- Feet/Paws -->
  <ellipse cx="46" cy="242" rx="15" ry="9" fill="#E87090"/>
  <ellipse cx="82" cy="242" rx="15" ry="9" fill="#E87090"/>

  <!-- Legs -->
  <rect x="38" y="216" width="18" height="32" rx="9" fill="#F9A0B8"/>
  <rect x="72" y="216" width="18" height="32" rx="9" fill="#F9A0B8"/>

  <!-- Body -->
  <ellipse cx="64" cy="200" rx="35" ry="28" fill="#F9C0CC"/>

  <!-- Belly -->
  <ellipse cx="64" cy="204" rx="22" ry="18" fill="#FFE8EE" opacity="0.75"/>

  <!-- Small heart on belly -->
  <path d="M60 203 C60 200 56 197 56 201 C56 206 60 210 64 213 C68 210 72 206 72 201 C72 197 68 200 68 203 C66 201 62 201 60 203 Z" fill="#FF6B8A" opacity="0.6"/>

  <!-- Left arm -->
  <ellipse cx="26" cy="196" rx="13" ry="21" transform="rotate(-18, 26, 196)" fill="#F9A0B8"/>
  <!-- Right arm -->
  <ellipse cx="102" cy="196" rx="13" ry="21" transform="rotate(18, 102, 196)" fill="#F9A0B8"/>

  <!-- Neck -->
  <rect x="55" y="170" width="18" height="20" rx="8" fill="#F9C0CC"/>

  <!-- Ears before head -->
  <!-- Left ear outer -->
  <ellipse cx="33" cy="60" rx="18" ry="57" transform="rotate(-10, 33, 60)" fill="#F9C0CC"/>
  <!-- Left ear inner -->
  <ellipse cx="33" cy="63" rx="10" ry="43" transform="rotate(-10, 33, 63)" fill="#FF8FA0"/>

  <!-- Right ear outer -->
  <ellipse cx="95" cy="60" rx="18" ry="57" transform="rotate(10, 95, 60)" fill="#F9C0CC"/>
  <!-- Right ear inner -->
  <ellipse cx="95" cy="63" rx="10" ry="43" transform="rotate(10, 95, 63)" fill="#FF8FA0"/>

  <!-- Flower on right ear -->
  <circle cx="98" cy="22" r="6" fill="#FFD0DC"/>
  <circle cx="92" cy="18" r="4" fill="#FFD0DC"/>
  <circle cx="104" cy="18" r="4" fill="#FFD0DC"/>
  <circle cx="92" cy="26" r="4" fill="#FFD0DC"/>
  <circle cx="104" cy="26" r="4" fill="#FFD0DC"/>
  <circle cx="98" cy="22" r="3" fill="#FF6B8A"/>

  <!-- Head -->
  <circle cx="64" cy="130" r="52" fill="#F9C0CC"/>

  <!-- Eyes white -->
  <circle cx="45" cy="125" r="16" fill="white"/>
  <circle cx="83" cy="125" r="16" fill="white"/>
  <!-- Iris dark plum -->
  <circle cx="45" cy="127" r="11" fill="#2A0A20"/>
  <circle cx="83" cy="127" r="11" fill="#2A0A20"/>
  <!-- Main shine -->
  <circle cx="39" cy="121" r="4.5" fill="white" opacity="0.95"/>
  <circle cx="77" cy="121" r="4.5" fill="white" opacity="0.95"/>
  <!-- Small shine -->
  <circle cx="48" cy="132" r="2" fill="white" opacity="0.6"/>
  <circle cx="86" cy="132" r="2" fill="white" opacity="0.6"/>

  <!-- Nose -->
  <ellipse cx="64" cy="144" rx="5" ry="3.5" fill="#D04060"/>

  <!-- Blush cheeks -->
  <ellipse cx="32" cy="141" rx="12" ry="7" fill="#FF8090" opacity="0.45"/>
  <ellipse cx="96" cy="141" rx="12" ry="7" fill="#FF8090" opacity="0.45"/>

  <!-- Mouth background -->
  <path d="M38 152 Q64 174 90 152 L90 161 Q64 183 38 161 Z" fill="#C03050"/>
  <!-- Teeth: 4 pointed -->
  <path d="M40 152 L46 142 L52 152 Z" fill="white"/>
  <path d="M53 152 L59 142 L65 152 Z" fill="white"/>
  <path d="M66 152 L72 142 L78 152 Z" fill="white"/>
  <path d="M79 152 L85 142 L88 152 Z" fill="white"/>
  <!-- Mouth outline -->
  <path d="M38 152 Q64 174 90 152" stroke="#902040" stroke-width="1.5" fill="none"/>
</svg>
